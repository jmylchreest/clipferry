# Maintains a rolling "chore: release" PR (version bump + changelog from
# Conventional Commits). Publishing is disabled in release-plz.toml until M5.
# Note: PRs opened with GITHUB_TOKEN do not trigger CI — close/reopen the
# release PR or push to it to get checks, or switch to a PAT later.
name: release-plz

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  release-pr:
    name: release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
